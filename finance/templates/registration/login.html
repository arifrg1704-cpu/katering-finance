<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Finance System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #2563eb 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            max-width: 420px;
            width: 100%;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            padding: 2rem 2rem 1.5rem;
            text-align: center;
        }

        .login-header .icon-circle {
            width: 64px;
            height: 64px;
            background: rgba(37, 99, 235, 0.2);
            border: 2px solid rgba(37, 99, 235, 0.4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
        }

        .login-header .icon-circle i {
            font-size: 1.75rem;
            color: #60a5fa;
        }

        .login-header h4 {
            color: #fff;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .login-header p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85rem;
            margin: 0;
        }

        .login-body {
            padding: 2rem;
        }

        .form-floating>.form-control {
            border-radius: 10px;
            border: 1.5px solid #e2e8f0;
            padding: 1rem 0.75rem;
            font-size: 0.9rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-floating>.form-control:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        .form-floating>label {
            font-size: 0.9rem;
            color: #94a3b8;
        }

        .btn-login {
            background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%);
            border: none;
            border-radius: 10px;
            padding: 0.75rem;
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 0.02em;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.35);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .alert {
            border-radius: 10px;
            font-size: 0.85rem;
            border: none;
        }

        .footer-text {
            text-align: center;
            padding: 0 2rem 1.5rem;
            color: #94a3b8;
            font-size: 0.75rem;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="login-header">
            <div class="icon-circle">
                <i class="bi bi-cash-stack"></i>
            </div>
            <h4>Finance System</h4>
            <p>Manajemen Keuangan</p>
        </div>
        <div class="login-body">
            {% if form.errors %}
            <div class="alert alert-danger d-flex align-items-center gap-2 mb-3">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <span>Username atau password salah. Silakan coba lagi.</span>
            </div>
            {% endif %}

            {% if messages %}
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }} d-flex align-items-center gap-2 mb-3">
                <i class="bi bi-info-circle-fill"></i>
                <span>{{ message }}</span>
            </div>
            {% endfor %}
            {% endif %}

            <form method="post" action="{% url 'login' %}">
                {% csrf_token %}
                <div class="form-floating mb-3">
                    <input type="text" name="username" id="id_username" class="form-control" placeholder="Username"
                        autofocus required>
                    <label for="id_username"><i class="bi bi-person me-1"></i>Username</label>
                </div>
                <div class="form-floating mb-4">
                    <input type="password" name="password" id="id_password" class="form-control" placeholder="Password"
                        required>
                    <label for="id_password"><i class="bi bi-lock me-1"></i>Password</label>
                </div>
                <input type="hidden" name="next" value="{{ next }}">
                <button type="submit" class="btn btn-primary btn-login w-100">
                    <i class="bi bi-box-arrow-in-right me-1"></i>Masuk
                </button>
            </form>
        </div>
        <div class="footer-text">
            &copy; 2026 Finance System. All rights reserved.
        </div>
    </div>
</body>

</html>
